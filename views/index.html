<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDGOC Club Portal</title>
    <!-- Tailwind CSS for clean Google-like styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="text-center p-8 bg-white shadow-xl rounded-2xl max-w-sm w-full">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">GDGOC Portal</h1>
        <p class="text-gray-500 mb-6">Connect, Learn, and Grow with Tech</p>
        
        <button id="loginBtn" class="w-full flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 bg-white rounded-full p-0.5" alt="Google">
            Sign In with Google
        </button>
    </div>

    <!-- Firebase Configuration Scripts -->
    <script type="module" src="/static/js/auth.js"></script>
</body>
</html>
